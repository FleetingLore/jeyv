site_name: jeyv
site_url: https://fleetinglore.github.io/jeyv/
theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - attr_list

extra_css:
  - https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css
  - https://fleetinglore.github.io/css/tikzjax.css
  - https://tikzjax.com/v1/fonts.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js
  - https://tikzjax.com/v1/tikzjax.js
  - javascripts/katex-init.js